services:
  postgres:
    image: postgres:16
    container_name: nadeul-postgres
    environment:
      POSTGRES_DB: nadeul
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nadeul-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: